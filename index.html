<!DOCTYPE html>
<html>
<head>
    <title>QA Activity Dashboard</title>
    <link rel="stylesheet" href="style.css">

    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <h1>QA Activity Dashboard</h1>

    <!-- FILTER SECTION -->
    <div class="filter-section">
        <select id="qaFilter">
            <option value="">All QA</option>
        </select>

        <select id="statusFilter">
            <option value="">All Status</option>
        </select>

        <button onclick="loadData()">Refresh</button>
    </div>

    <!-- SUMMARY CARDS -->
    <div class="summary">
        <div class="card">
            <h3>Total Tasks</h3>
            <p id="totalTasks">0</p>
        </div>

        <div class="card">
            <h3>LIVE Releases</h3>
            <p id="liveCount">0</p>
        </div>

        <div class="card">
            <h3>UAT Releases</h3>
            <p id="uatCount">0</p>
        </div>

        <div class="card">
            <h3>P1 Tasks</h3>
            <p id="p1Count">0</p>
        </div>
    </div>

    <!-- TABLE -->
    <h2>Daily Activity</h2>
    <table id="taskTable">
        <thead>
            <tr>
                <th>Jira</th>
                <th>QA</th>
                <th>Type</th>
                <th>Dev</th>
                <th>Priority</th>
                <th>Complexity</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <!-- CHART -->
    <h2>Visualization</h2>
    <canvas id="qaChart"></canvas>

    <script src="script.js"></script>

</body>
</html>
