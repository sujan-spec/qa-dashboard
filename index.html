<!DOCTYPE html>
<html>
<head>
    <title>QA Activity Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h1>QA Activity Dashboard</h1>

<div class="form-container">
    <input type="text" id="jiraId" placeholder="Enter Jira ID">

    <select id="qaName">
        <option value="">Select QA</option>
        <option>Adarsh</option>
        <option>Arpita</option>
        <option>Mamata</option>
        <option>Soudip</option>
        <option>Sujan</option>
    </select>

    <select id="taskType">
        <option value="">Task Type</option>
        <option>Enhancement</option>
        <option>Task</option>
        <option>Story</option>
        <option>New Feature</option>
        <option>Epic</option>
        <option>Bug</option>
    </select>

    <select id="developer">
        <option value="">Developer</option>
        <option>A</option>
        <option>B</option>
        <option>C</option>
        <option>D</option>
        <option>E</option>
        <option>F</option>
        <option>G</option>
        <option>H</option>
        <option>I</option>
        <option>J</option>
        <option>K</option>
    </select>

    <select id="priority">
        <option value="">Priority</option>
        <option>P1</option>
        <option>P2</option>
        <option>P3</option>
        <option>P4</option>
        <option>P5</option>
    </select>

    <select id="complexity">
        <option value="">Complexity</option>
        <option>L-1</option>
        <option>L-2</option>
        <option>L-3</option>
        <option>L-4</option>
        <option>L-5</option>
    </select>

    <select id="status">
        <option value="">Status</option>
        <option>WIP</option>
        <option>Done</option>
        <option>UAT</option>
        <option>LIVE</option>
        <option>Blocked</option>
        <option>Pending-QA</option>
        <option>Pending-Developer</option>
    </select>

    <button onclick="addTask()">Add</button>
</div>

<h2>Daily Activity</h2>

<table id="taskTable">
    <thead>
        <tr>
            <th>Jira</th>
            <th>QA</th>
            <th>Type</th>
            <th>Dev</th>
            <th>Priority</th>
            <th>Complexity</th>
            <th>Status</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<h2>Visualization</h2>
<canvas id="qaChart"></canvas>

<script src="script.js"></script>

</body>
</html>
